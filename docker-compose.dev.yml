# Dev overrides: exposes Caddy on :80, Postgres on :5432, enables Mailpit
services:
  caddy:
    ports:
      - "80:80"

  postgres:
    ports:
      - "5432:5432"

  backend:
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      BASE_URL: http://localhost
      ALLOWED_ORIGIN: http://localhost

  frontend:
    environment:
      ORIGIN: http://localhost
