services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mesascore
      POSTGRES_USER: mesascore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesascore"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
    profiles: ["dev"]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://mesascore:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mesascore?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      BASE_URL: ${BASE_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-MesaScore <noreply@mesascore.local>}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:5173}
      BGG_API_TOKEN: ${BGG_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      ORIGIN: ${BASE_URL:-http://localhost}
    depends_on:
      - backend

  caddy:
    image: caddy:2
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  caddy_data:
